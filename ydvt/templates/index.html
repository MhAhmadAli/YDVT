<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YDVT: Image Dataset Visualization Tool</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>YDVT</h1>
                <p>Dataset Explorer</p>
            </div>
            <div class="summary-stats" id="sidebar-stats">
                <!-- Populated by JS -->
            </div>
            <div class="sidebar-actions">
                <button id="open-augment-btn" class="btn-accent" title="Augment dataset to balance classes">
                    ✦ Augment
                </button>
            </div>
            <div class="image-list-container">
                <input type="text" id="search-input" placeholder="Search images..." />
                <ul class="image-list" id="image-list">
                    <!-- Populated by JS -->
                </ul>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Analytics Dashboard -->
            <section class="dashboard card">
                <div class="chart-container">
                    <canvas id="classDistChart"></canvas>
                </div>
                <div class="chart-container">
                    <canvas id="bboxSizeChart"></canvas>
                </div>
            </section>

            <!-- Image Viewer -->
            <section class="viewer card">
                <div class="viewer-header">
                    <h2 id="current-image-name">Select an image</h2>
                    <div id="current-image-details" class="image-details"></div>
                </div>
                <div class="canvas-wrapper" id="canvas-wrapper">
                    <!-- The img tag will hold the actual image, canvas will overlay for drawing boxes -->
                    <img id="main-image" src="" alt="Dataset Image" style="display: none;" />
                    <canvas id="annotation-canvas"></canvas>
                </div>
            </section>
        </main>
    </div>

    <!-- Augmentation Modal -->
    <div id="augment-modal" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <div class="modal-header">
                <h2>✦ Augment Dataset</h2>
                <button id="close-augment-btn" class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <!-- Class Selection -->
                <div class="modal-section">
                    <h3>Target Classes</h3>
                    <p class="hint">Select underrepresented classes to augment.</p>
                    <div id="class-select-list" class="class-select-grid">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- Augmentation Selection -->
                <div class="modal-section">
                    <h3>Augmentations</h3>
                    <p class="hint">Choose which transformations to apply.</p>
                    <div id="augmentation-select-list" class="aug-select-grid">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- Count -->
                <div class="modal-section">
                    <h3>Images per Class</h3>
                    <p class="hint">Number of augmented images to generate per selected class.</p>
                    <input type="number" id="aug-count-input" class="aug-count-input" min="1" max="500" value="5" />
                </div>

                <!-- Strict Mode -->
                <div class="modal-section">
                    <label class="strict-mode-toggle">
                        <input type="checkbox" id="aug-strict-input" />
                        <span class="strict-mode-label">
                            <strong>Strict Mode</strong>
                            <span class="hint" style="margin-bottom:0;">Only use source images where every bounding box belongs to the target class. Prevents other class counts from increasing.</span>
                        </span>
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <div id="augment-status" class="augment-status"></div>
                <button id="apply-augment-btn" class="btn-accent btn-apply">Apply Augmentations</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
